services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: covagro
      POSTGRES_USER: covagro
      POSTGRES_PASSWORD: covagro
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U covagro -d covagro"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./app/Backend
    environment:
      SECRET_KEY: covagro-compose-secret
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost,http://127.0.0.1,http://localhost:3000,http://127.0.0.1:3000
      POSTGRES_DB: covagro
      POSTGRES_USER: covagro
      POSTGRES_PASSWORD: covagro
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      SEED_DATA: "true"
      SEED_PRODUCTOS: "1000"
      SEED_PEDIDOS: "3000"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./app/Frontend
      args:
        VITE_API_BASE_URL: /api/
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres-data:
